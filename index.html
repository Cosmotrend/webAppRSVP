<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <!-- Removed maximum-scale/user-scalable — blocks iOS accessibility zoom -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0D0008" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Semilac Days - RSVP Premium</title>
    <meta name="description" content="Événement VIP exclusif Semilac Days avec roue de la fortune et réductions jusqu'à -40%" />

    <!-- Google Analytics 4 — remplacer G-XXXXXXXXXX par votre ID de mesure -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XXXXXXXXXX');
    </script>

    <!-- Preconnect to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Google Fonts - Montserrat & Cormorant Garamond -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet" />

    <!-- Polyfills for older iOS Safari (< 15.4) -->
    <script>
      if (!Object.hasOwn) {
        Object.hasOwn = function(obj, prop) {
          return Object.prototype.hasOwnProperty.call(obj, prop);
        };
      }
    </script>
    <style>
      @layer base {
        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }
      }

      html {
        width: 100%;
        height: 100%;
        background: #0D0008;
      }

      body {
        width: 100%;
        /* Use dvh (dynamic viewport height) — correctly excludes URL bar & Dynamic Island */
        height: 100dvh;
        /* Fallback for Safari < 15.4 */
        height: -webkit-fill-available;
        /* dvh override for modern browsers */
        @supports (height: 100dvh) {
          height: 100dvh;
        }
        overflow: hidden;
        background: #0D0008;
        font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overscroll-behavior: none;
        /* manipulation reduces 300ms tap delay on iOS */
        touch-action: manipulation;
        /* Safe area padding for Dynamic Island (iPhone 14 Pro / 15 / 16 / 17) */
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }

      #root {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      /* iOS Safari: prevent auto-zoom on input focus.
         Zoom triggers when font-size < 16px. This overrides to 16px on iOS only,
         keeping the desktop design intact. */
      @supports (-webkit-touch-callout: none) {
        input, select, textarea {
          font-size: 16px !important;
        }
      }

      /* Respect reduced motion — disables GPU-heavy animations on iOS Low Power Mode */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }

      /* Loading spinner */
      #root:empty::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 40px;
        height: 40px;
        border: 3px solid rgba(248, 164, 200, 0.2);
        border-top-color: #F8A4C8;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to { transform: translate(-50%, -50%) rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
