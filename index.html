<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <!-- Removed maximum-scale/user-scalable — blocks iOS accessibility zoom -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#FAF7F2" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Semilac Days - RSVP Premium</title>
    <meta name="description" content="Événement VIP exclusif Semilac Days avec roue de la fortune et réductions jusqu'à -40%" />

    <!-- Google Analytics 4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-HYHJW099MD"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-HYHJW099MD');
    </script>

    <!-- Preconnect to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Google Fonts - Montserrat & Cormorant Garamond -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet" />

    <!-- Polyfills for older iOS Safari (< 15.4) -->
    <script>
      if (!Object.hasOwn) {
        Object.hasOwn = function(obj, prop) {
          return Object.prototype.hasOwnProperty.call(obj, prop);
        };
      }
    </script>

    <!--
      KIOSQUE TV — applique la classe kiosk-mode SYNCHRONIQUEMENT avant React.
      Ça évite le flash / décalage au premier rendu et garantit que le CSS
      @media (orientation: landscape) + rotation s'active au tout premier frame.
    -->
    <script>
      (function() {
        try {
          var params = new URLSearchParams(window.location.search);
          // Détection tolérante : accepte "kiosk=1", " kiosk=1", "tv=1", etc.
          var urlKiosk = false;
          params.forEach(function(value, key) {
            var k = key.trim().toLowerCase();
            var v = (value || '').trim();
            if ((k === 'kiosk' || k === 'tv') && v === '1') urlKiosk = true;
          });
          if (urlKiosk) {
            window.sessionStorage.setItem('kioskMode', '1');
          }
          var isKiosk = urlKiosk || window.sessionStorage.getItem('kioskMode') === '1';
          var path = window.location.pathname;
          var isStep2 = /(staff-pin|wheel-code|wheel|result|greeting)/.test(path);
          if (isKiosk && isStep2) {
            document.documentElement.classList.add('kiosk-mode');
          }
          // Protection : réapplique la classe si quelque chose la retire
          // (React StrictMode cleanup, navigation, etc.)
          var observer = new MutationObserver(function() {
            var stillKiosk = window.sessionStorage.getItem('kioskMode') === '1';
            var stillStep2 = /(staff-pin|wheel-code|wheel|result|greeting)/.test(window.location.pathname);
            if (stillKiosk && stillStep2 && !document.documentElement.classList.contains('kiosk-mode')) {
              document.documentElement.classList.add('kiosk-mode');
            }
            if ((!stillKiosk || !stillStep2) && document.documentElement.classList.contains('kiosk-mode')) {
              document.documentElement.classList.remove('kiosk-mode');
            }
          });
          observer.observe(document.documentElement, { attributes: true, attributeFilter: ['class'] });
          // Re-check à chaque navigation SPA (History API)
          var _push = history.pushState;
          var _replace = history.replaceState;
          function recheck() {
            var k = window.sessionStorage.getItem('kioskMode') === '1';
            var s2 = /(staff-pin|wheel-code|wheel|result|greeting)/.test(window.location.pathname);
            if (k && s2) document.documentElement.classList.add('kiosk-mode');
            else document.documentElement.classList.remove('kiosk-mode');
          }
          history.pushState = function() { _push.apply(this, arguments); setTimeout(recheck, 0); };
          history.replaceState = function() { _replace.apply(this, arguments); setTimeout(recheck, 0); };
          window.addEventListener('popstate', recheck);
        } catch (e) {}
      })();
    </script>
    <style>
      @layer base {
        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }
      }

      html {
        width: 100%;
        height: 100%;
        background: #FAF7F2;
      }

      body {
        width: 100%;
        /* Use dvh (dynamic viewport height) — correctly excludes URL bar & Dynamic Island */
        height: 100dvh;
        /* Fallback for Safari < 15.4 */
        height: -webkit-fill-available;
        /* dvh override for modern browsers */
        @supports (height: 100dvh) {
          height: 100dvh;
        }
        overflow: hidden;
        background: #FAF7F2;
        font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overscroll-behavior: none;
        /* manipulation reduces 300ms tap delay on iOS */
        touch-action: manipulation;
        /* Safe area padding for Dynamic Island (iPhone 14 Pro / 15 / 16 / 17) */
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }

      #root {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      /* iOS Safari: prevent auto-zoom on input focus.
         Zoom triggers when font-size < 16px. This overrides to 16px on iOS only,
         keeping the desktop design intact. */
      @supports (-webkit-touch-callout: none) {
        input, select, textarea {
          font-size: 16px !important;
        }
      }

      /* Respect reduced motion — disables GPU-heavy animations on iOS Low Power Mode */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }

      /* Loading spinner */
      #root:empty::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 40px;
        height: 40px;
        border: 3px solid rgba(248, 164, 200, 0.2);
        border-top-color: #F8A4C8;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to { transform: translate(-50%, -50%) rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
